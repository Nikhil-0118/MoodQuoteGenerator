<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mood Quote Generator</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>😊 Mood Quote Generator</h1>

        <p class="subtitle">
            Tell me how you're feeling and let AI inspire you.
        </p>

        <form method="POST" id="quoteForm">

            <input
                type="text"
                name="mood"
                placeholder="How are you feeling today?"
                required>

            <button id="generateBtn">
                Generate Quote ✨
            </button>

        </form>

        <div id="loading" class="loading">
            🤖 AI is thinking...
        </div>

        {% if quote %}

        <div class="quote-box">

            <h3>Your Quote</h3>

            <p>{{ quote }}</p>

        </div>

        {% endif %}

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
